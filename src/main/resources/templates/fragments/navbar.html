<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">

<head>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <nav th:fragment="navbar-guest" class="navbar">
        <div class="container navbar-content">
            <a class="brand-logo" th:href="@{/}">
                <img th:src="@{/images/logo.svg}" alt="Ticketeo Logo" class="logo-svg"
                    style="height: 45px; vertical-align: middle; margin-right: 10px;">
                TICKETEO
            </a>

            <button class="navbar-hamburger" id="navHamburgerGuest" aria-label="Abrir menú">
                <span></span><span></span><span></span>
            </button>

            <div class="navbar-collapse" id="navCollapseGuest">
                <form th:action="@{/user}" method="get" class="search-form-fino">
                    <select name="categoryId" class="search-select-fino">
                        <option value="">Todas las Categorías</option>
                        <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"
                            th:selected="${currentCategory != null && currentCategory == category.id}"></option>
                    </select>
                    <input type="text" name="search" placeholder="Buscar evento..." th:value="${currentSearch}"
                        class="search-input-fino">
                    <button type="submit" class="search-btn-fino">Buscar</button>
                </form>

                <div class="user-menu">
                    <a th:href="@{/login}" class="btn-login-fino">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        Iniciar Sesión
                    </a>
                </div>
            </div>
        </div>
    </nav>


    <nav th:fragment="navbar-user" class="navbar">
        <div class="container navbar-content">
            <a class="brand-logo" th:href="@{/user}">
                <img th:src="@{/images/logo.svg}" alt="Ticketeo Logo" class="logo-svg"
                    style="height: 45px; vertical-align: middle; margin-right: 10px;">
                TICKETEO
            </a>

            <button class="navbar-hamburger" id="navHamburgerUser" aria-label="Abrir menú">
                <span></span><span></span><span></span>
            </button>

            <div class="navbar-collapse" id="navCollapseUser">
                <ul class="nav-links">
                    <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin}" class="nav-item" th:classappend="${currentUri == '/admin' or currentUri.startsWith('/admin/')} ? 'active' : ''">Panel Admin</a></li>
                </ul>

                <form th:action="@{/user}" method="get" class="search-form-fino">
                    <select name="categoryId" class="search-select-fino">
                        <option value="">Todas las Categorías</option>
                        <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"
                            th:selected="${currentCategory != null && currentCategory == category.id}"></option>
                    </select>
                    <input type="text" name="search" placeholder="Buscar evento..." th:value="${currentSearch}"
                        class="search-input-fino">
                    <button type="submit" class="search-btn-fino">Buscar</button>
                </form>

                <div class="user-menu">
                    <th:block sec:authorize="isAnonymous()">
                        <a th:href="@{/login}" class="btn-login-fino">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            Iniciar Sesión
                        </a>
                    </th:block>

                    <th:block sec:authorize="isAuthenticated()">
                        <div class="dropdown">
                            <div class="profile-badge-fino dropdown-toggle" id="userDropdown" role="button" aria-haspopup="true" aria-expanded="false">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                    class="profile-icon">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                                <span sec:authentication="name"
                                    style="font-weight: 600; font-size: 14px; text-transform: capitalize;">User</span>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 5px;">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </div>
                            <ul class="dropdown-menu" aria-labelledby="userDropdown">
                                <li>
                                    <a th:href="@{/user/interests}" class="dropdown-item">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px; vertical-align: middle;">
                                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                                        </svg>
                                        Mis Intereses
                                    </a>
                                </li>
                                <li>
                                    <a th:href="@{/user/purchases}" class="dropdown-item">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px; vertical-align: middle;">
                                            <path d="M6 2l1.5 4h9L18 2"></path>
                                            <path d="M3 6h18l-2 14H5L3 6z"></path>
                                            <path d="M9 10v6"></path>
                                            <path d="M15 10v6"></path>
                                        </svg>
                                        Mis Compras
                                    </a>
                                </li>
                                <li>
                                    <form th:action="@{/logout}" method="post" style="margin: 0;">
                                        <button type="submit" class="dropdown-item" style="color: #fca5a5;">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                stroke-width="2" style="margin-right: 8px; vertical-align: middle;">
                                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                                <polyline points="16 17 21 12 16 7"></polyline>
                                                <line x1="21" y1="12" x2="9" y2="12"></line>
                                            </svg>
                                            Cerrar Sesión
                                        </button>
                                    </form>
                                </li>
                            </ul>
                        </div>
                    </th:block>
                </div>
            </div>
        </div>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const dropdownToggle = document.getElementById('userDropdown');
                if (dropdownToggle) {
                    const dropdownMenu = dropdownToggle.nextElementSibling;

                    dropdownToggle.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        dropdownMenu.classList.toggle('show');
                        const isExpanded = dropdownMenu.classList.contains('show');
                        dropdownToggle.setAttribute('aria-expanded', isExpanded);
                    });

                    document.addEventListener('click', function(e) {
                        if (!dropdownToggle.contains(e.target) && !dropdownMenu.contains(e.target)) {
                            dropdownMenu.classList.remove('show');
                            dropdownToggle.setAttribute('aria-expanded', 'false');
                        }
                    });
                }
            });
        </script>
    </nav>


    <nav th:fragment="navbar-admin" class="navbar">
        <div class="container navbar-content">
            <a class="brand-logo" th:href="@{/admin}">
                <img th:src="@{/images/logo.svg}" alt="Ticketeo Logo" class="logo-svg"
                    style="height: 45px; vertical-align: middle; margin-right: 10px;">
                TICKETEO
            </a>

            <ul class="nav-links">
                <li><a th:href="@{/admin}" class="nav-item" th:classappend="${currentUri == '/admin' or currentUri == '/admin/completed' or currentUri == '/admin/event/new' or currentUri.startsWith('/admin/event/edit/')} ? 'active' : ''">Eventos</a></li>
                <li><a th:href="@{/admin/category}" class="nav-item" th:classappend="${currentUri.startsWith('/admin/category')} ? 'active' : ''">Categorías</a></li>
                <li><a th:href="@{/admin/ticket-type}" class="nav-item" th:classappend="${currentUri.startsWith('/admin/ticket-type')} ? 'active' : ''">Tipos de Ticket</a></li>
                <li><a th:href="@{/admin/users}" class="nav-item" th:classappend="${currentUri.startsWith('/admin/users')} ? 'active' : ''">Usuarios</a></li>
                <li><a th:href="@{/admin/reports}" class="nav-item" th:classappend="${currentUri.startsWith('/admin/reports')} ? 'active' : ''">Reportes</a></li>
            </ul>

            <div class="user-menu">
                <div class="profile-badge-fino admin">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="profile-icon">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span sec:authentication="name"
                        style="font-weight: 600; font-size: 14px; text-transform: capitalize;">Admin</span>
                </div>

                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <button type="submit" class="btn-logout-fino">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        Salir
                    </button>
                </form>
            </div>
        </div>
    </nav>


</body>

</html>
