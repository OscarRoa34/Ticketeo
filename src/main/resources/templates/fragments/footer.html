<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <footer th:fragment="footer" class="site-footer">
        <div class="container footer-content">

            <div class="footer-section brand-section">
                <div class="brand-logo">
                    <img th:src="@{/images/logo.svg}" alt="Ticketeo" class="logo-svg">
                    <h2 class="brand-text">TICKETEO</h2>
                </div>
            </div>

            <div class="footer-section team-section">
                <h3>Desarrollado por</h3>
                <ul class="team-list">
                    <li>
                        <a href="https://github.com/Davidaguilar03" target="_blank" class="github-link">
                            <img th:src="@{/images/github-icon.svg}" alt="GitHub" class="github-icon"> David Aguilar
                        </a>
                    </li>
                    <li>
                        <a href="https://github.com/OscarRoa34" target="_blank" class="github-link">
                            <img th:src="@{/images/github-icon.svg}" alt="GitHub" class="github-icon"> Oscar Roa
                        </a>
                    </li>
                </ul>
            </div>

            <div class="footer-section top-button-section">
                <a href="#top" class="back-to-top-btn" title="Volver al inicio de la página">
                    <span class="arrow">↑</span>
                </a>
            </div>

        </div>

        <div class="footer-bottom">
            <p>&copy; 2026 Ticketeo.</p>
        </div>
        <div id="appToast"
             th:if="${successMessage != null or errorMessage != null or toastErrorMessage != null}"
             class="app-toast"
             th:classappend="${successMessage != null} ? ' app-toast-success' : ' app-toast-error'"
             th:attr="data-toast-message=${successMessage != null ? successMessage : (errorMessage != null ? errorMessage : toastErrorMessage)}, data-toast-type=${successMessage != null ? 'success' : 'error'}, data-toast-variant=${toastVariant}"
             role="status"
             aria-live="polite"
             aria-atomic="true">
            <div class="app-toast-body">
                <span class="app-toast-icon" th:text="${successMessage != null ? '✓' : '!'}">!</span>
                <div class="app-toast-content">
                    <p class="app-toast-title" th:text="${successMessage != null ? 'Operacion exitosa' : 'Error en la operacion'}">Operacion</p>
                    <p class="app-toast-message" th:text="${successMessage != null ? successMessage : (errorMessage != null ? errorMessage : toastErrorMessage)}">Mensaje</p>
                </div>
                <button type="button" class="app-toast-close" aria-label="Cerrar">&times;</button>
            </div>
        </div>

        <script th:src="@{/js/common/toast.js}"></script>
    </footer>

</body>

</html>
