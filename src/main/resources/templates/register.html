<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Ticketeo</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="login-header">
                <img th:src="@{/images/logo.svg}" alt="Logo Ticketeo" class="login-logo" onerror="this.style.display='none'" style="max-width: 120px; height: auto; margin-bottom: 15px;">
                
                <h2>Crear una Cuenta</h2>
                <p class="login-subtitle">Únete a Ticketeo para conseguir tus entradas</p>
            </div>

            <div th:if="${error}" class="alert alert-error">
                <svg viewBox="0 0 24 24" class="alert-icon"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                <span th:text="${error}">Error al registrarse</span>
            </div>

            <form th:action="@{/register}" method="post">
                
                <div class="form-group">
                    <label for="username">Nombre de Usuario</label>
                    <div class="input-container">
                        <input type="text" id="username" name="username" class="form-control" placeholder="Ingresa tu usuario" required autofocus />
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-container password-container">
                        <input type="password" id="password" name="password" class="form-control" placeholder="Crea una contraseña" required />
                        <button type="button" class="toggle-password-btn" data-target="password" aria-label="Mostrar contraseña">
                            <svg viewBox="0 0 24 24" class="eye-icon"><path fill="currentColor" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña</label>
                    <div class="input-container password-container">
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Repite tu contraseña" required />
                        <button type="button" class="toggle-password-btn" data-target="confirmPassword" aria-label="Mostrar contraseña">
                            <svg viewBox="0 0 24 24" class="eye-icon"><path fill="currentColor" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="login-btn">Registrarse</button>
            </form>
            
            <div class="login-footer">
                <p>¿Ya tienes una cuenta? <a th:href="@{/login}" class="register-link">Inicia sesión aquí</a></p>
            </div>
            
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggleButtons = document.querySelectorAll('.toggle-password-btn');

            const eyeOpenSvg = '<path fill="currentColor" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
            const eyeClosedSvg = '<path fill="currentColor" d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';

            toggleButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const targetId = this.getAttribute('data-target');
                    const passwordInput = document.getElementById(targetId);
                    const eyeIcon = this.querySelector('.eye-icon');
                    
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    
                    if (type === 'password') {
                        eyeIcon.innerHTML = eyeOpenSvg;
                        this.setAttribute('aria-label', 'Mostrar contraseña');
                    } else {
                        eyeIcon.innerHTML = eyeClosedSvg;
                        this.setAttribute('aria-label', 'Ocultar contraseña');
                    }
                });
            });
        });
    </script>
</body>
</html>
