<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketeo | Detalles del Evento</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/events/css/event-details.css}">
</head>

<body>

    <div th:replace="~{fragments/navbar :: navbar-user}"></div>

    <main class="event-details-container">
        <article class="event-details-card">

            <div class="event-image-col">
                <img th:src="${event.imageUrl}" th:alt="${event.name}" class="event-hero-image" id="eventImage">
                <span class="zoom-hint">Ver imagen</span>
            </div>

            <div class="event-info-col">

                <span th:if="${event.category != null}" class="event-category-label" th:text="${event.category.name}"
                    th:style="'color:' + ${event.category.color} + '; border-color:' + ${event.category.color} + ';'">
                    Categoría
                </span>

                <h1 class="event-title" th:text="${event.name}">Nombre del Evento</h1>

                <div class="event-meta-row">
                    <div class="event-meta-item">
                        <span class="event-meta-label">Fecha</span>
                        <span class="event-meta-value"
                            th:text="${#temporals.format(event.date, 'dd/MM/yyyy')}">01/01/2026</span>
                    </div>
                    <div class="event-meta-item">
                        <span class="event-meta-label">Precio</span>
                        <span class="event-meta-value price-tag" th:data-price="${event.price}"
                            th:text="${(event.price == null or event.price == 0) ? 'Gratis' : '$' + event.price}">$0</span>
                    </div>
                </div>

                <div class="event-divider"></div>

                <div class="event-description-section">
                    <span class="event-description-label">Acerca del evento</span>
                    <p class="event-description-text" th:text="${event.description}">Descripción del evento.</p>
                </div>

                <div class="event-actions">
                    <th:block sec:authorize="isAuthenticated()">
                        <form th:action="@{/event/{id}/interest(id=${event.id})}" method="post" id="interestForm">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit"
                                id="interestButton"
                                th:class="${isInterested} ? 'btn-danger btn-action-full' : 'btn-primary btn-action-full'"
                                th:text="${isInterested} ? 'Ya no me interesa' : 'Me interesa'"
                                th:attr="aria-pressed=${isInterested}">
                            </button>
                        </form>
                        <p id="interestFeedback" role="status" aria-live="polite" style="margin-top: 10px;"></p>
                    </th:block>

                    <th:block sec:authorize="isAnonymous()">
                        <a th:href="@{/login}" class="btn-primary btn-action-full"
                            title="Inicia sesión para mostrar interés"
                            style="text-align: center; display: block; text-decoration: none;">
                            Inicia sesión para interesarte
                        </a>
                    </th:block>

                    <a th:href="@{/user}" class="btn-secondary btn-action-full"
                        style="text-align: center; display: block; text-decoration: none;">Volver al catálogo</a>
                </div>

            </div>

        </article>
    </main>

    <div class="image-modal" id="imageModal">
        <span class="image-modal-close" id="modalClose">&times;</span>
        <img class="image-modal-img" id="modalImg">
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        function formatPrice() {
            document.querySelectorAll('.price-tag').forEach(el => {
                const raw = el.getAttribute('data-price');
                const price = parseFloat(raw);
                if (raw && raw !== 'null' && !isNaN(price) && price !== 0) {
                    el.textContent = new Intl.NumberFormat('es-CO', {
                        style: 'currency', currency: 'COP', minimumFractionDigits: 0
                    }).format(price);
                } else {
                    el.textContent = 'Gratis';
                }
            });
        }

        function setupInterestToggle() {
            const form = document.getElementById('interestForm');
            const button = document.getElementById('interestButton');
            const feedback = document.getElementById('interestFeedback');

            if (!form || !button) {
                return;
            }

            form.addEventListener('submit', async (event) => {
                event.preventDefault();

                const previousLabel = button.textContent;
                button.disabled = true;
                button.textContent = 'Procesando...';

                try {
                    const body = new URLSearchParams(new FormData(form));
                    const response = await fetch(form.action, {
                        method: 'POST',
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest',
                            'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
                        },
                        body: body.toString(),
                        credentials: 'same-origin'
                    });

                    if (!response.ok) {
                        throw new Error('No se pudo procesar la solicitud');
                    }

                    const data = await response.json();

                    if (!data.success) {
                        throw new Error(data.message || 'No fue posible actualizar el interés');
                    }

                    const interested = Boolean(data.interested);
                    button.classList.toggle('btn-danger', interested);
                    button.classList.toggle('btn-primary', !interested);
                    button.textContent = interested ? 'Ya no me interesa' : 'Me interesa';
                    button.setAttribute('aria-pressed', String(interested));

                    if (feedback) {
                        feedback.textContent = data.message || '';
                    }
                } catch (error) {
                    button.textContent = previousLabel;
                    if (feedback) {
                        feedback.textContent = error.message || 'Ocurrió un error al actualizar el interés';
                    }
                } finally {
                    button.disabled = false;
                }
            });
        }

        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');
        const eventImage = document.getElementById('eventImage');
        const modalClose = document.getElementById('modalClose');

        eventImage.addEventListener('click', () => {
            modal.classList.add('active');
            modalImg.src = eventImage.src;
        });

        modalClose.addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

        document.addEventListener('DOMContentLoaded', () => {
            formatPrice();
            setupInterestToggle();

            const pairs = [
                { btn: 'navHamburgerGuest',  collapse: 'navCollapseGuest' },
                { btn: 'navHamburgerUser',   collapse: 'navCollapseUser' }
            ];
            pairs.forEach(({ btn, collapse }) => {
                const b = document.getElementById(btn);
                const c = document.getElementById(collapse);
                if (b && c) {
                    b.addEventListener('click', () => {
                        const isOpen = c.classList.toggle('open');
                        b.classList.toggle('open', isOpen);
                    });
                }
            });
        });
    </script>

</body>

</html>
