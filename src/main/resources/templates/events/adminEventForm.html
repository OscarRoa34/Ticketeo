<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${event.id == null ? 'Ticketeo | Nuevo Evento' : 'Ticketeo | Editar Evento'}">Ticketeo | Evento
    </title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar-admin}"></div>

<main class="container event-form-page">

    <div class="event-form-card">

        <div class="event-form-header">
            <div class="event-form-header-icon">
                <img th:src="@{/images/logo.svg}" alt="Ticketeo Logo">
            </div>
            <div class="event-form-header-text">
                <h2 th:text="${event.id != null ? 'Editar Evento' : 'Crear Nuevo Evento'}">Evento</h2>
                <p th:text="${event.id != null ? 'Modifica los datos del evento seleccionado.' : 'Completa los datos para publicar un nuevo evento en el catálogo.'}">Descripción
                </p>
            </div>
        </div>

        <div class="event-form-divider"></div>


        <form id="adminEventForm" th:action="@{/admin/event/save}" th:object="${event}" method="POST" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" name="draft" th:value="${draft}">
            <input type="hidden" id="restoredImageData" name="restoredImageData" value="">

            <div class="event-form-body">

                <div class="event-form-fields">

                    <div class="ef-group">
                        <label for="name" class="ef-label">Nombre del Evento</label>
                        <input type="text" id="name" th:field="*{name}" class="ef-input"
                               placeholder="Ej: Concierto de Rock Local" required>
                    </div>

                    <div class="ef-row">
                        <div class="ef-group">
                            <label for="category" class="ef-label">Categoría</label>
                            <select id="category" name="category" class="ef-select"
                                    th:attr="data-event-id=${event.id},data-draft=${draft},data-created-category=${newlyCreatedCategoryId != null}">
                                <option value="">Sin categoría</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}"
                                        th:selected="${event.category != null && event.category.id == cat.id}"></option>
                                <option value="-1">+ Nueva categoría</option>
                            </select>
                        </div>
                        <div class="ef-group">
                            <label for="date" class="ef-label">Fecha del Evento</label>
                            <input type="date" id="date" th:field="*{date}" class="ef-input">
                        </div>
                    </div>

                    <div class="ef-group">
                        <label for="description" class="ef-label">Descripción</label>
                        <textarea id="description" th:field="*{description}" class="ef-textarea"
                                  placeholder="Escribe los detalles del evento: artistas, horario, lugar..."></textarea>
                    </div>

                    <div class="ef-group">
                        <label for="ticketTypeSearch" class="ef-label">Tipos de Ticket, Cantidad y Precio</label>
                        <input type="text" id="ticketTypeSearch" class="ef-input" placeholder="Buscar tipo de ticket...">

                        <div class="ef-ticket-types" id="ticketTypeList">
                            <div class="ef-ticket-type-row" th:each="ticketType : ${ticketTypes}"
                                 th:classappend="${newlyCreatedTicketTypeId != null and newlyCreatedTicketTypeId == ticketType.id ? ' ef-ticket-type-row-created' : ''}"
                                 th:attr="data-name=${#strings.toLowerCase(ticketType.name)},data-ticket-id=${ticketType.id}">
                                <label class="ef-ticket-type-label"
                                       th:classappend="${soldTicketTypes != null and soldTicketTypes[ticketType.id] == true ? ' ef-ticket-type-label-locked' : ''}">
                                    <input type="checkbox"
                                           name="ticketTypeIds"
                                           th:value="${ticketType.id}"
                                           class="ef-ticket-type-check"
                                           th:checked="${ticketQuantities[ticketType.id] != null}"
                                           onclick="if (this.readOnly) return false;"
                                           th:readonly="${soldTicketTypes != null and soldTicketTypes[ticketType.id] == true}"
                                           th:attr="data-locked=${soldTicketTypes != null and soldTicketTypes[ticketType.id] == true}">
                                    <span th:text="${ticketType.name}">VIP</span>
                                    <span th:if="${soldTicketTypes != null and soldTicketTypes[ticketType.id] == true}" class="ef-sold-badge">Bloqueado por ventas</span>
                                </label>

                                <input type="number"
                                       min="1"
                                       class="ef-input ef-ticket-qty"
                                       th:name="${ticketQuantities[ticketType.id] != null ? 'ticketQuantity_' + ticketType.id : null}"
                                       th:attr="data-param-name=${'ticketQuantity_' + ticketType.id}"
                                       th:value="${ticketQuantities[ticketType.id]}"
                                       th:disabled="${ticketQuantities[ticketType.id] == null}"
                                       th:readonly="${soldTicketTypes != null and soldTicketTypes[ticketType.id] == true}"
                                       th:classappend="${soldTicketTypes != null and soldTicketTypes[ticketType.id] == true ? ' ef-input-locked' : ''}"
                                       placeholder="Cantidad">

                                <div class="ef-ticket-price-wrapper">
                                    <span class="ef-price-prefix">$</span>
                                    <input type="text"
                                           class="ef-input ef-ticket-price-display"
                                           th:id="${'ticketPriceDisplay_' + ticketType.id}"
                                           th:value="${ticketPrices[ticketType.id] != null and ticketPrices[ticketType.id] gt 0 ? #numbers.formatInteger(ticketPrices[ticketType.id], 1, 'POINT') : ''}"
                                           th:disabled="${ticketQuantities[ticketType.id] == null}"
                                           th:readonly="${soldTicketTypes != null and soldTicketTypes[ticketType.id] == true}"
                                           th:classappend="${soldTicketTypes != null and soldTicketTypes[ticketType.id] == true ? ' ef-input-locked' : ''}"
                                           placeholder="Precio">
                                    <input type="hidden"
                                           class="ef-ticket-price-hidden"
                                           th:name="${ticketQuantities[ticketType.id] != null ? 'ticketPrice_' + ticketType.id : null}"
                                           th:attr="data-param-name=${'ticketPrice_' + ticketType.id},data-display-id=${'ticketPriceDisplay_' + ticketType.id}"
                                           th:value="${ticketPrices[ticketType.id]}">
                                </div>
                            </div>
                            <p th:if="${#lists.isEmpty(ticketTypes)}" class="ef-ticket-empty">
                                No hay tipos de ticket creados. Primero crea uno en el módulo Tipos de Ticket.
                            </p>

                            <div class="ef-ticket-type-row ef-ticket-type-row-action">
                                <div class="ef-ticket-type-action-copy">
                                    <span class="ef-ticket-type-action-title">¿No encuentras el tipo?</span>
                                    <span class="ef-ticket-type-action-subtitle">Crea uno nuevo y vuelve aquí automáticamente.</span>
                                </div>
                                <a class="ef-btn-new-ticket-type"
                                   th:href="${event.id != null} ? @{/admin/ticket-type/new(fromEventForm=true,eventId=${event.id},draft=${draft})} : @{/admin/ticket-type/new(fromEventForm=true,draft=${draft})}">
                                    + Nuevo tipo de boleta
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="ef-form-actions">
                        <a th:href="@{/admin}" class="ef-btn-cancel">Cancelar</a>
                        <button type="submit" class="ef-btn-submit">
                            <span th:text="${event.id != null ? '✦ Guardar Cambios' : '✦ Publicar Evento'}">Guardar</span>
                        </button>
                    </div>
                </div>

                <div class="event-form-image-panel">
                    <span class="ef-image-label">Póster del Evento</span>

                    <div class="ef-image-drop" id="imageDropZone" onclick="document.getElementById('imageFile').click()">
                        <div class="ef-image-placeholder" id="imagePlaceholder"
                             th:style="${event.imageUrl != null ? 'display:none' : 'display:flex; flex-direction:column; align-items:center;'}">
                            <div class="ef-image-placeholder-icon">🖼</div>
                            <p>Haz clic para subir<br><span>JPG, PNG o WebP</span></p>
                        </div>
                        <img id="imagePreview" th:src="${event.imageUrl}" alt="Vista previa"
                             th:style="${event.imageUrl != null ? 'display:block' : 'display:none'}">
                    </div>

                    <input type="file" id="imageFile" name="imageFile" class="ef-file-input"
                           accept="image/png, image/jpeg, image/webp">

                    <p class="ef-image-hint">Recomendado: imagen cuadrada</p>
                </div>

            </div>
        </form>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    const eventForm = document.getElementById('adminEventForm');
    const fileInput = document.getElementById('imageFile');
    const restoredImageDataInput = document.getElementById('restoredImageData');
    const imgPreview = document.getElementById('imagePreview');
    const placeholder = document.getElementById('imagePlaceholder');
    const ticketTypeSearch = document.getElementById('ticketTypeSearch');
    const categorySelect = document.getElementById('category');
    const ticketTypeRows = document.querySelectorAll('.ef-ticket-type-row:not(.ef-ticket-type-row-action)');
    const ticketTypeActionRow = document.querySelector('.ef-ticket-type-row-action');
    const ticketTypeChecks = document.querySelectorAll('.ef-ticket-type-check');
    const ticketTypeShortcut = document.querySelector('.ef-btn-new-ticket-type');
    const MAX_IMAGE_SIZE_BYTES = 50 * 1024 * 1024;
    const EVENT_FORM_STATE_KEY = 'ticketeo.admin.eventFormState';
    const EVENT_FORM_IMAGE_DB_NAME = 'ticketeo.admin.eventForm';
    const EVENT_FORM_IMAGE_STORE_NAME = 'images';
    const EVENT_FORM_IMAGE_KEY_PREFIX = 'event:';
    const MAX_STATE_AGE_MS = 30 * 60 * 1000;

    let previewObjectUrl = null;

    function rawNumber(str) {
        return str.replace(/[^\d]/g, '');
    }

    function syncFormattedPrice(displayInput, hiddenInput) {
        const raw = rawNumber(displayInput.value);
        if (raw) {
            displayInput.value = parseInt(raw, 10).toLocaleString('es-CO');
            hiddenInput.value = raw;
        } else {
            displayInput.value = '';
            hiddenInput.value = '';
        }
    }

    function buildStateContextKey() {
        const eventId = categorySelect ? (categorySelect.dataset.eventId || 'new') : 'new';
        const draftFlag = categorySelect && categorySelect.dataset.draft === 'true' ? 'draft' : 'active';
        return eventId + ':' + draftFlag;
    }

    function buildImageStorageKey(contextKey) {
        return EVENT_FORM_IMAGE_KEY_PREFIX + contextKey;
    }

    function revokePreviewObjectUrl() {
        if (previewObjectUrl) {
            URL.revokeObjectURL(previewObjectUrl);
            previewObjectUrl = null;
        }
    }

    function setImagePreviewFromFile(file) {
        if (!file) {
            return;
        }
        revokePreviewObjectUrl();
        previewObjectUrl = URL.createObjectURL(file);
        imgPreview.src = previewObjectUrl;
        imgPreview.style.display = 'block';
        placeholder.style.display = 'none';
    }

    function openImageDb() {
        return new Promise(function (resolve, reject) {
            if (!window.indexedDB) {
                resolve(null);
                return;
            }

            const request = indexedDB.open(EVENT_FORM_IMAGE_DB_NAME, 1);
            request.onupgradeneeded = function () {
                const db = request.result;
                if (!db.objectStoreNames.contains(EVENT_FORM_IMAGE_STORE_NAME)) {
                    db.createObjectStore(EVENT_FORM_IMAGE_STORE_NAME);
                }
            };
            request.onsuccess = function () {
                resolve(request.result);
            };
            request.onerror = function () {
                reject(request.error);
            };
        });
    }

    async function saveImageToDb(contextKey, file) {
        const db = await openImageDb();
        if (!db) {
            return;
        }

        await new Promise(function (resolve, reject) {
            const tx = db.transaction(EVENT_FORM_IMAGE_STORE_NAME, 'readwrite');
            tx.oncomplete = function () {
                resolve();
            };
            tx.onerror = function () {
                reject(tx.error);
            };
            tx.objectStore(EVENT_FORM_IMAGE_STORE_NAME).put(file, buildImageStorageKey(contextKey));
        });

        db.close();
    }

    async function getImageFromDb(contextKey) {
        const db = await openImageDb();
        if (!db) {
            return null;
        }

        const image = await new Promise(function (resolve, reject) {
            const tx = db.transaction(EVENT_FORM_IMAGE_STORE_NAME, 'readonly');
            tx.onerror = function () {
                reject(tx.error);
            };
            const request = tx.objectStore(EVENT_FORM_IMAGE_STORE_NAME).get(buildImageStorageKey(contextKey));
            request.onsuccess = function () {
                resolve(request.result || null);
            };
            request.onerror = function () {
                reject(request.error);
            };
        });

        db.close();
        return image;
    }

    async function removeImageFromDb(contextKey) {
        const db = await openImageDb();
        if (!db) {
            return;
        }

        await new Promise(function (resolve, reject) {
            const tx = db.transaction(EVENT_FORM_IMAGE_STORE_NAME, 'readwrite');
            tx.oncomplete = function () {
                resolve();
            };
            tx.onerror = function () {
                reject(tx.error);
            };
            tx.objectStore(EVENT_FORM_IMAGE_STORE_NAME).delete(buildImageStorageKey(contextKey));
        });

        db.close();
    }

    function assignFileToInput(file) {
        if (!fileInput || typeof DataTransfer === 'undefined') {
            return false;
        }

        try {
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            fileInput.files = dataTransfer.files;
            return true;
        } catch (error) {
            return false;
        }
    }

    function fileToDataUrl(file) {
        return new Promise(function (resolve, reject) {
            const reader = new FileReader();
            reader.onload = function (event) {
                resolve(typeof event.target.result === 'string' ? event.target.result : '');
            };
            reader.onerror = function () {
                reject(reader.error);
            };
            reader.readAsDataURL(file);
        });
    }

    async function saveEventFormState() {
        if (!eventForm) {
            return;
        }

        const state = {
            context: buildStateContextKey(),
            savedAt: Date.now(),
            fields: {},
            ticketSelections: [],
            imageStored: false
        };

        const fields = eventForm.querySelectorAll('input[name], textarea[name], select[name]');
        fields.forEach(function (field) {
            const name = field.name;
            if (!name
                || name === 'imageFile'
                || name === 'ticketTypeIds'
                || name === 'restoredImageData'
                || name.startsWith('ticketQuantity_')
                || name.startsWith('ticketPrice_')) {
                return;
            }
            if (field.type === 'checkbox' || field.type === 'radio') {
                if (field.checked) {
                    state.fields[name] = field.value;
                }
                return;
            }
            state.fields[name] = field.value;
        });

        ticketTypeChecks.forEach(function (check) {
            const row = check.closest('.ef-ticket-type-row');
            const qtyInput = row ? row.querySelector('.ef-ticket-qty') : null;
            const priceHiddenInput = row ? row.querySelector('.ef-ticket-price-hidden') : null;
            state.ticketSelections.push({
                ticketId: check.value,
                checked: check.checked,
                quantity: qtyInput ? qtyInput.value : '',
                price: priceHiddenInput ? priceHiddenInput.value : ''
            });
        });

        const selectedImage = fileInput && fileInput.files ? fileInput.files[0] : null;
        if (selectedImage) {
            await saveImageToDb(state.context, selectedImage);
            state.imageStored = true;
        } else {
            await removeImageFromDb(state.context);
        }

        sessionStorage.setItem(EVENT_FORM_STATE_KEY, JSON.stringify(state));
    }

    function ensureCreatedTicketTypeSelected(selectedTicketTypeId) {
        if (!selectedTicketTypeId) {
            return;
        }

        const targetCheck = Array.from(ticketTypeChecks).find(function (check) {
            return check.value === selectedTicketTypeId;
        });

        if (!targetCheck) {
            return;
        }

        if (!targetCheck.checked && targetCheck.dataset.locked !== 'true') {
            targetCheck.checked = true;
            targetCheck.dispatchEvent(new Event('change'));
        }

        const targetRow = targetCheck.closest('.ef-ticket-type-row');
        if (!targetRow) {
            return;
        }

        const qtyInput = targetRow.querySelector('.ef-ticket-qty');
        if (qtyInput && (!qtyInput.value || qtyInput.value === '0')) {
            qtyInput.value = '1';
        }

        targetRow.classList.add('ef-ticket-type-row-created');
    }

    async function restoreEventFormState() {
        if (!eventForm) {
            return;
        }

        const rawState = sessionStorage.getItem(EVENT_FORM_STATE_KEY);
        if (!rawState) {
            return;
        }

        let state;
        try {
            state = JSON.parse(rawState);
        } catch (error) {
            sessionStorage.removeItem(EVENT_FORM_STATE_KEY);
            return;
        }

        if (!state || state.context !== buildStateContextKey()) {
            return;
        }

        if (!state.savedAt || (Date.now() - state.savedAt) > MAX_STATE_AGE_MS) {
            sessionStorage.removeItem(EVENT_FORM_STATE_KEY);
            await removeImageFromDb(state.context);
            return;
        }

        const searchParams = new URLSearchParams(window.location.search);
        const selectedCategoryId = searchParams.get('selectedCategoryId');
        const selectedTicketTypeId = searchParams.get('selectedTicketTypeId');

        const fields = state.fields || {};
        Object.keys(fields).forEach(function (name) {
            if (name === 'category' && selectedCategoryId) {
                return;
            }
            const field = eventForm.querySelector('[name="' + name + '"]');
            if (!field) {
                return;
            }
            if (field.type === 'checkbox' || field.type === 'radio') {
                field.checked = field.value === fields[name];
                return;
            }
            field.value = fields[name];
        });

        if (Array.isArray(state.ticketSelections)) {
            state.ticketSelections.forEach(function (selection) {
                const check = eventForm.querySelector('.ef-ticket-type-check[value="' + selection.ticketId + '"]');
                if (!check) {
                    return;
                }

                const row = check.closest('.ef-ticket-type-row');
                const qtyInput = row ? row.querySelector('.ef-ticket-qty') : null;
                const priceDisplayInput = row ? row.querySelector('.ef-ticket-price-display') : null;
                const priceHiddenInput = row ? row.querySelector('.ef-ticket-price-hidden') : null;
                const isLocked = check.dataset.locked === 'true';

                if (!isLocked) {
                    check.checked = Boolean(selection.checked);
                    check.dispatchEvent(new Event('change'));
                }

                if (qtyInput && selection.quantity !== undefined && selection.quantity !== null) {
                    qtyInput.value = selection.quantity;
                }

                if (priceHiddenInput) {
                    priceHiddenInput.value = selection.price || '';
                }

                if (priceDisplayInput) {
                    const raw = selection.price || '';
                    if (raw) {
                        const parsed = parseInt(raw, 10);
                        priceDisplayInput.value = Number.isNaN(parsed) ? '' : parsed.toLocaleString('es-CO');
                    } else {
                        priceDisplayInput.value = '';
                    }
                }
            });
        }

        if (selectedCategoryId && categorySelect) {
            categorySelect.value = selectedCategoryId;
            categorySelect.dataset.lastSelectedValue = selectedCategoryId;
            categorySelect.classList.add('ef-select-created');
        }

        if (state.imageStored) {
            const storedImage = await getImageFromDb(state.context);
            if (storedImage) {
                setImagePreviewFromFile(storedImage);
                if (restoredImageDataInput) {
                    restoredImageDataInput.value = '';
                }
                const wasAssigned = assignFileToInput(storedImage);
                if (!wasAssigned && restoredImageDataInput) {
                    try {
                        restoredImageDataInput.value = await fileToDataUrl(storedImage);
                    } catch (error) {
                        restoredImageDataInput.value = '';
                    }
                }
            }
        }

        ensureCreatedTicketTypeSelected(selectedTicketTypeId);
        sessionStorage.removeItem(EVENT_FORM_STATE_KEY);
    }

    if (fileInput) {
        fileInput.addEventListener('change', function () {
            const file = this.files[0];
            if (!file) {
                return;
            }

            if (file.size > MAX_IMAGE_SIZE_BYTES) {
                alert('La imagen supera el límite permitido de 50MB.');
                this.value = '';
                return;
            }

            if (restoredImageDataInput) {
                restoredImageDataInput.value = '';
            }

            setImagePreviewFromFile(file);
            saveImageToDb(buildStateContextKey(), file).catch(function () {
            });
        });
    }

    window.addEventListener('beforeunload', revokePreviewObjectUrl);

    document.addEventListener('DOMContentLoaded', function () {
        if (eventForm) {
            eventForm.addEventListener('submit', function () {
                const contextKey = buildStateContextKey();
                sessionStorage.removeItem(EVENT_FORM_STATE_KEY);
                removeImageFromDb(contextKey).catch(function () {
                });
            });
        }

        if (ticketTypeShortcut) {
            ticketTypeShortcut.addEventListener('click', async function (event) {
                event.preventDefault();
                const targetUrl = this.href;
                try {
                    await saveEventFormState();
                } finally {
                    window.location.href = targetUrl;
                }
            });
        }

        if (categorySelect) {
            const eventId = categorySelect.dataset.eventId;
            const isDraft = categorySelect.dataset.draft === 'true';
            categorySelect.dataset.lastSelectedValue = categorySelect.value;
            if (categorySelect.dataset.createdCategory === 'true') {
                categorySelect.classList.add('ef-select-created');
            }

            categorySelect.addEventListener('change', async function () {
                if (this.value === '-1') {
                    const lastSelectedValue = this.dataset.lastSelectedValue || '';
                    this.value = lastSelectedValue;

                    const query = new URLSearchParams();
                    query.set('fromEventForm', 'true');
                    query.set('draft', String(isDraft));
                    if (eventId) {
                        query.set('eventId', eventId);
                    }

                    try {
                        await saveEventFormState();
                    } finally {
                        window.location.href = '/admin/category/new?' + query.toString();
                    }
                    return;
                }
                this.dataset.lastSelectedValue = this.value;
            });
        }

        ticketTypeChecks.forEach(function (check) {
            const row = check.closest('.ef-ticket-type-row');
            const qtyInput = row.querySelector('.ef-ticket-qty');
            const priceDisplayInput = row.querySelector('.ef-ticket-price-display');
            const priceHiddenInput = row.querySelector('.ef-ticket-price-hidden');
            const isLocked = check.dataset.locked === 'true';

            qtyInput.disabled = !check.checked;
            priceDisplayInput.disabled = !check.checked;

            if (check.checked) {
                qtyInput.name = qtyInput.dataset.paramName;
                priceHiddenInput.name = priceHiddenInput.dataset.paramName;
            } else {
                qtyInput.removeAttribute('name');
                priceHiddenInput.removeAttribute('name');
            }

            if (isLocked) {
                check.checked = true;
                qtyInput.disabled = false;
                priceDisplayInput.disabled = false;
                qtyInput.readOnly = true;
                priceDisplayInput.readOnly = true;
                qtyInput.name = qtyInput.dataset.paramName;
                priceHiddenInput.name = priceHiddenInput.dataset.paramName;
            }

            if (check.checked && !isLocked && (!qtyInput.value || qtyInput.value === '0')) {
                qtyInput.value = '1';
            }

            if (priceHiddenInput.value) {
                const parsedHiddenPrice = parseFloat(priceHiddenInput.value);
                if (!isNaN(parsedHiddenPrice) && parsedHiddenPrice > 0) {
                    const roundedPrice = Math.round(parsedHiddenPrice);
                    priceHiddenInput.value = String(roundedPrice);
                    priceDisplayInput.value = roundedPrice.toLocaleString('es-CO');
                }
            }

            priceDisplayInput.addEventListener('input', function () {
                if (isLocked) {
                    return;
                }
                syncFormattedPrice(priceDisplayInput, priceHiddenInput);
            });

            check.addEventListener('change', function () {
                if (isLocked) {
                    this.checked = true;
                    return;
                }
                qtyInput.disabled = !this.checked;
                priceDisplayInput.disabled = !this.checked;
                if (this.checked) {
                    qtyInput.name = qtyInput.dataset.paramName;
                    priceHiddenInput.name = priceHiddenInput.dataset.paramName;
                } else {
                    qtyInput.removeAttribute('name');
                    priceHiddenInput.removeAttribute('name');
                }
                if (this.checked && (!qtyInput.value || qtyInput.value === '0')) {
                    qtyInput.value = '1';
                }
            });
        });

        if (ticketTypeSearch) {
            ticketTypeSearch.addEventListener('input', function () {
                const searchValue = this.value.toLowerCase().trim();
                ticketTypeRows.forEach(function (row) {
                    const name = row.dataset.name || '';
                    row.style.display = name.includes(searchValue) ? 'grid' : 'none';
                });

                if (ticketTypeActionRow) {
                    ticketTypeActionRow.style.display = 'grid';
                }
            });
        }

        (async function () {
            await restoreEventFormState();
            const createdRow = document.querySelector('.ef-ticket-type-row-created');
            if (createdRow) {
                createdRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        })();
    });
</script>

</body>
</html>
