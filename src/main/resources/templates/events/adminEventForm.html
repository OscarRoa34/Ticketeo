<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${event.id == null ? 'Ticketeo | Nuevo Evento' : 'Ticketeo | Editar Evento'}">Ticketeo | Evento
    </title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar-admin}"></div>

<main class="container event-form-page">

    <div class="event-form-card">

        <div class="event-form-header">
            <div class="event-form-header-icon">
                <img th:src="@{/images/logo.svg}" alt="Ticketeo Logo">
            </div>
            <div class="event-form-header-text">
                <h2 th:text="${event.id != null ? 'Editar Evento' : (draft ? 'Crear Evento Inactivo' : 'Crear Nuevo Evento')}">Evento</h2>
                <p th:text="${event.id != null ? 'Modifica los datos del evento seleccionado.' : (draft ? 'Este evento se guardará como inactivo y no será visible para los usuarios hasta que lo actives.' : 'Completa los datos para publicar un nuevo evento en el catálogo.')}">Descripción
                </p>
            </div>
        </div>

        <div class="event-form-divider"></div>

        <form th:action="@{/admin/event/save}" th:object="${event}" method="POST" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" name="draft" th:value="${draft != null ? draft : false}" />

            <div class="event-form-body">

                <div class="event-form-fields">

                    <div class="ef-group">
                        <label for="name" class="ef-label">Nombre del Evento</label>
                        <input type="text" id="name" th:field="*{name}" class="ef-input"
                               placeholder="Ej: Concierto de Rock Local" required>
                    </div>

                    <div class="ef-row">
                        <div class="ef-group">
                            <label for="category" class="ef-label">Categoría</label>
                            <select id="category" name="category" class="ef-select">
                                <option value="">Sin categoría</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}"
                                        th:selected="${event.category != null && event.category.id == cat.id}"></option>
                            </select>
                        </div>
                        <div class="ef-group">
                            <label for="date" class="ef-label">Fecha del Evento</label>
                            <input type="date" id="date" th:field="*{date}" class="ef-input">
                        </div>
                    </div>

                    <div class="ef-group">
                        <label for="price" class="ef-label">Valor de la Entrada</label>
                        <div class="ef-price-wrapper">
                            <span class="ef-price-prefix">$</span>
                            <input type="text" id="price" class="ef-input"
                                   th:value="${event.price != null && event.price > 0 ? #numbers.formatInteger(event.price, 1, 'POINT') : ''}"
                                   placeholder="Dejar vacío si es gratis" autocomplete="off">
                            <input type="hidden" id="priceHidden" th:field="*{price}">
                        </div>
                    </div>

                    <div class="ef-group">
                        <label for="description" class="ef-label">Descripción</label>
                        <textarea id="description" th:field="*{description}" class="ef-textarea"
                                  placeholder="Escribe los detalles del evento: artistas, horario, lugar..."></textarea>
                    </div>

                    <div class="ef-form-actions">
                        <a th:href="${draft ? '/admin/inactive' : '/admin'}" class="ef-btn-cancel">Cancelar</a>
                        <button type="submit" class="ef-btn-submit">
                            <span th:text="${event.id != null ? '✦ Guardar Cambios' : (draft ? '✦ Guardar como Inactivo' : '✦ Publicar Evento')}">Guardar</span>
                        </button>
                    </div>
                </div>

                <div class="event-form-image-panel">
                    <span class="ef-image-label">Póster del Evento</span>

                    <div class="ef-image-drop" id="imageDropZone" onclick="document.getElementById('imageFile').click()">
                        <div class="ef-image-placeholder" id="imagePlaceholder"
                             th:style="${event.imageUrl != null ? 'display:none' : 'display:flex; flex-direction:column; align-items:center;'}">
                            <div class="ef-image-placeholder-icon">🖼</div>
                            <p>Haz clic para subir<br><span>JPG, PNG o WebP</span></p>
                        </div>
                        <img id="imagePreview" th:src="${event.imageUrl}" alt="Vista previa"
                             th:style="${event.imageUrl != null ? 'display:block' : 'display:none'}">
                    </div>

                    <input type="file" id="imageFile" name="imageFile" class="ef-file-input"
                           accept="image/png, image/jpeg, image/webp">

                    <p class="ef-image-hint">Recomendado: imagen cuadrada</p>
                </div>

            </div>
        </form>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    const fileInput = document.getElementById('imageFile');
    const imgPreview = document.getElementById('imagePreview');
    const placeholder = document.getElementById('imagePlaceholder');
    const priceDisplay = document.getElementById('price');
    const priceHidden = document.getElementById('priceHidden');

    fileInput.addEventListener('change', function () {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = e => {
                imgPreview.src = e.target.result;
                imgPreview.style.display = 'block';
                placeholder.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    });

    function rawNumber(str) {
        return str.replace(/[^\d]/g, '');
    }

    priceDisplay.addEventListener('input', function () {
        const raw = rawNumber(this.value);
        if (raw) {
            this.value = parseInt(raw, 10).toLocaleString('es-CO');
            priceHidden.value = raw;
        } else {
            this.value = '';
            priceHidden.value = '';
        }
    });

    document.addEventListener('DOMContentLoaded', function () {
        const hiddenVal = priceHidden.value;
        if (hiddenVal && hiddenVal !== '') {
            const num = parseFloat(hiddenVal);
            if (!isNaN(num) && num > 0) {
                priceHidden.value = Math.round(num).toString();
            } else {
                priceHidden.value = '';
                priceDisplay.value = '';
            }
        }
    });
</script>

</body>
</html>
