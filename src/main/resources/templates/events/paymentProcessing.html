<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketeo | Procesando pago</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/events/payment-success.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar-user}"></div>

<main class="payment-success-container">
    <section class="payment-success-card payment-success-card--processing" role="status" aria-live="polite">
        <div class="success-check-wrap" aria-hidden="true">
            <div class="success-check-icon">…</div>
        </div>

        <header class="success-header">
            <h1>Procesando pago</h1>
            <p class="success-caption">Estamos siguiendo tu compra paso a paso. Esto puede tardar unos segundos.</p>
            <p class="success-event-name" th:text="${event.name}">Nombre del evento</p>
        </header>

        <div class="success-divider"></div>

        <div class="checkeo-live checkeo-live--processing" id="checkeoLive" th:attr="data-tracking-id=${trackingId},data-event-id=${event.id}">
            <div class="checkeo-live-header">
                <strong>Seguimiento en tiempo real</strong>
                <span class="checkeo-live-status" id="checkeoLiveStatus">Esperando actualizaciones...</span>
            </div>
            <ol class="checkeo-timeline checkeo-timeline--horizontal" id="checkeoTimeline"></ol>
        </div>

        <div class="success-actions">
            <a th:href="@{/event/{id}(id=${event.id})}" class="btn-secondary">Volver al evento</a>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    const RESULT_POLL_MS = 800;
    const RESULT_TIMEOUT_MS = 60000;
    const NO_EVENT_TIMEOUT_MS = 12000;
    const PHASE_ORDER = ['recepcion', 'validacion_empresa', 'transaccion', 'validacion_proveedor', 'resultado'];
    const PHASE_LABELS = {
        recepcion: 'Solicitud recibida',
        validacion_empresa: 'Empresa validada',
        transaccion: 'Transaccion creada',
        validacion_proveedor: 'Validando tarjeta',
        resultado: 'Resultado final'
    };
    let lastEventAt = Date.now();
    let pollingStarted = false;

    function updateLiveStatus(text, type) {
        const statusEl = document.getElementById('checkeoLiveStatus');
        if (!statusEl) {
            return;
        }
        statusEl.textContent = text;
        statusEl.className = 'checkeo-live-status';
        if (type) {
            statusEl.classList.add('is-' + type);
        }
    }


    function buildTimeline() {
        const timeline = document.getElementById('checkeoTimeline');
        if (!timeline) {
            return;
        }
        const phases = [
            { key: 'recepcion', label: 'Solicitud recibida', icon: 'inbox' },
            { key: 'validacion_empresa', label: 'Empresa validada', icon: 'shield' },
            { key: 'transaccion', label: 'Transaccion creada', icon: 'database' },
            { key: 'validacion_proveedor', label: 'Validando tarjeta', icon: 'card' },
            { key: 'resultado', label: 'Resultado final', icon: 'flag' }
        ];

        timeline.innerHTML = '';
        phases.forEach((phase) => {
            const item = document.createElement('li');
            item.className = 'timeline-item is-pending';
            item.setAttribute('data-phase', phase.key);

            const icon = document.createElement('span');
            icon.className = 'timeline-icon';
            icon.setAttribute('aria-hidden', 'true');
            icon.innerHTML = getTimelineIcon(phase.icon);

            const text = document.createElement('span');
            text.className = 'timeline-text';
            text.textContent = phase.label;

            const note = document.createElement('span');
            note.className = 'timeline-note';
            note.textContent = 'Pendiente';

            item.appendChild(icon);
            item.appendChild(text);
            item.appendChild(note);
            timeline.appendChild(item);
        });
    }

    function getTimelineIcon(name) {
        switch (name) {
            case 'inbox':
                return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v12H4z"/><path d="M4 16l4-4h8l4 4"/><path d="M9 12h6"/></svg>';
            case 'shield':
                return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 4v5c0 4-3 7-7 9-4-2-7-5-7-9V7l7-4z"/><path d="M9 12l2 2 4-4"/></svg>';
            case 'database':
                return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="7" ry="3"/><path d="M5 5v6c0 1.7 3.1 3 7 3s7-1.3 7-3V5"/><path d="M5 11v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6"/></svg>';
            case 'card':
                return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/><path d="M7 15h4"/></svg>';
            case 'flag':
                return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3v18"/><path d="M5 4h10l-2 4 2 4H5"/></svg>';
            default:
                return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/></svg>';
        }
    }

    function updateTimeline(phase, status, message) {
        const timeline = document.getElementById('checkeoTimeline');
        if (!timeline) {
            return;
        }
        const item = timeline.querySelector('[data-phase="' + phase + '"]');
        if (!item) {
            return;
        }
        const phaseIndex = PHASE_ORDER.indexOf(phase);
        if (phaseIndex >= 0 && status !== 'error') {
            for (let i = 0; i < phaseIndex; i += 1) {
                const previous = timeline.querySelector('[data-phase="' + PHASE_ORDER[i] + '"]');
                if (previous && previous.classList.contains('is-pending')) {
                    previous.classList.remove('is-pending', 'is-error');
                    previous.classList.add('is-success');
                    const previousNote = previous.querySelector('.timeline-note');
                    if (previousNote) {
                        previousNote.textContent = 'Completado';
                    }
                }
            }
        }
        item.classList.remove('is-pending', 'is-success', 'is-error');
        if (status === 'error') {
            item.classList.add('is-error');
        } else {
            item.classList.add('is-success');
        }

        const note = item.querySelector('.timeline-note');
        if (note) {
            note.textContent = message || (status === 'error' ? 'Error' : 'Completado');
        }
    }

    function waitForResult(trackingId) {
        if (pollingStarted) {
            return;
        }
        pollingStarted = true;
        const start = Date.now();

        function poll() {
            fetch('/event/purchase/result/' + trackingId + '/ready', { headers: { 'Accept': 'application/json' } })
                .then((res) => res.ok ? res.json() : null)
                .then((data) => {
                    if (data && data.ready) {
                        window.location.href = '/event/purchase/result/' + trackingId;
                        return;
                    }
                    if (Date.now() - start > RESULT_TIMEOUT_MS) {
                        updateLiveStatus('Tiempo de espera agotado. Intenta de nuevo.', 'error');
                        return;
                    }
                    setTimeout(poll, RESULT_POLL_MS);
                })
                .catch(() => {
                    if (Date.now() - start > RESULT_TIMEOUT_MS) {
                        updateLiveStatus('Tiempo de espera agotado. Intenta de nuevo.', 'error');
                        return;
                    }
                    setTimeout(poll, RESULT_POLL_MS);
                });
        }

        poll();
    }

    function connectLiveUpdates() {
        const liveBox = document.getElementById('checkeoLive');
        if (!liveBox) {
            return;
        }
        const trackingId = liveBox.getAttribute('data-tracking-id');
        if (!trackingId) {
            updateLiveStatus('No hay seguimiento disponible.', 'muted');
            return;
        }

        const socket = new SockJS('/ws');
        const stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, () => {
            updateLiveStatus('Conectado. Esperando eventos...', 'success');
            lastEventAt = Date.now();
            startNoEventWatchdog(trackingId);
            stompClient.subscribe('/topic/purchases/' + trackingId, (frame) => {
                try {
                    const payload = JSON.parse(frame.body);
                    const phase = payload.phase || 'fase';
                    const status = payload.status || 'estado';
                    const message = payload.message || 'Actualizacion recibida';
                    const friendlyPhase = PHASE_LABELS[phase] || 'Actualizacion';
                    const friendlyStatus = status === 'error' ? 'Algo salio mal' : 'Avanzando';
                    lastEventAt = Date.now();
                    updateTimeline(phase, status, message);
                    updateLiveStatus(friendlyPhase + ' · ' + friendlyStatus, status === 'error' ? 'error' : 'success');
                    if (status === 'error' || phase === 'resultado') {
                        waitForResult(trackingId);
                    }
                } catch (err) {
                    updateLiveStatus('Actualizacion invalida.', 'error');
                    waitForResult(trackingId);
                }
            });
        }, () => {
            updateLiveStatus('Sin conexion al canal.', 'error');
            waitForResult(trackingId);
        });
    }

    function startNoEventWatchdog(trackingId) {
        setInterval(() => {
            if (Date.now() - lastEventAt > NO_EVENT_TIMEOUT_MS) {
                updateLiveStatus('Sin respuesta de Checkeo. Verificando...', 'error');
                waitForResult(trackingId);
            }
        }, 2000);
    }

    document.addEventListener('DOMContentLoaded', () => {
        buildTimeline();
        connectLiveUpdates();
    });
</script>

</body>

</html>
