<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketeo | Mis Intereses</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div th:replace="~{fragments/navbar :: navbar-user}"></div>

    <header class="hero-section" style="min-height: 200px; padding: 60px 0 20px;">
        <h1 class="hero-title">Mis Eventos de Interés</h1>
        <p class="hero-subtitle" style="text-align: center; color: rgba(255,255,255,0.7); max-width: 600px; margin: 10px auto;">
            Aquí encontrarás todos los eventos que has marcado como interesantes.
        </p>
    </header>

    <main class="container main-content" style="padding-top: 30px;">

        <div class="events-grid">

            <article class="event-card" th:each="event : ${events}">

                <img th:src="${event.imageUrl}" class="card-image" th:alt="${event.name}">

                <div class="card-body">
                    <span th:if="${event.category != null}" class="category-badge"
                          th:text="${event.category.name}"
                          th:style="'color:' + ${event.category.color} + '; border-color:' + ${event.category.color} + ';'">Categoría</span>

                    <h2 class="card-title" th:text="${event.name}">Nombre del Evento</h2>

                    <p class="card-description" th:text="${event.description}">Descripción y detalles del evento.</p>

                    <div class="card-footer">
                        <span class="price-tag"
                              th:text="${(event.price == null or event.price == 0.0) ? 'Gratis' : '$ ' + #numbers.formatDecimal(event.price, 0, 'POINT', 0, 'COMMA')}">$0</span>

                        <a th:href="@{/event/{id}(id=${event.id})}" class="btn-secondary">Ver Detalles</a>
                    </div>
                </div>
            </article>

            <div th:if="${#lists.isEmpty(events)}" style="grid-column: 1 / -1; text-align: center; padding: 70px 20px;">
                <p style="color: var(--white); font-size: 2rem; font-weight: 800; text-shadow: 0 0 30px rgba(139,92,246,0.5), 0 2px 10px rgba(0,0,0,0.4); letter-spacing: 0.02em; margin-bottom: 12px;">
                    No tienes eventos marcados
                </p>
                <p style="color: rgba(255,255,255,0.45); font-size: 1rem; font-weight: 400;">
                    Vuelve al inicio para descubrir eventos y márcalos como "Me interesa".
                </p>
                <a th:href="@{/user}" class="btn-secondary" style="margin-top: 20px; display: inline-block;">Descubrir Eventos</a>
            </div>

        </div>

    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
