<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketeo | Gestión de Usuarios</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar-admin}"></div>

<main class="container admin-container">

    <div class="admin-header">
        <div>
            <h1 class="admin-title">Gestión de Usuarios</h1>
            <p class="admin-subtitle">Consulta los usuarios registrados en la plataforma.</p>
        </div>
        <div class="admin-actions">
            <span class="admin-subtitle" style="font-size: 13px; color: #aaa;">
                Total: <strong th:text="${totalUsers}">0</strong> usuarios
            </span>
        </div>
    </div>

    <div class="table-responsive">
        <table class="admin-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre de Usuario</th>
                <th class="text-center">Rol</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td class="col-id" th:text="${user.id}">1</td>
                <td class="col-name" th:text="${user.username}">usuario</td>
                <td class="text-center">
                    <span class="role-badge"
                          th:classappend="${user.role.name() == 'ADMIN'} ? 'role-admin' : 'role-user'"
                          th:text="${user.role.name() == 'ADMIN'} ? 'Administrador' : 'Usuario'">Usuario</span>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="3" style="text-align: center; padding: 30px;">
                    No hay usuarios registrados en el sistema.
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination-container" th:if="${totalPages > 1}">
        <ul class="pagination">
            <li>
                <a th:href="@{/admin/users(page=${currentPage > 0 ? currentPage - 1 : 0})}"
                   class="page-link" th:classappend="${currentPage == 0} ? 'disabled' : ''">
                    &laquo; Anterior
                </a>
            </li>
            <li th:if="${currentPage > 2}">
                <a th:href="@{/admin/users(page=0)}" class="page-link">1</a>
            </li>
            <li th:if="${currentPage > 3}">
                <span class="page-dots">...</span>
            </li>
            <li th:if="${currentPage > 1}">
                <a th:href="@{/admin/users(page=${currentPage - 1})}" class="page-link" th:text="${currentPage}"></a>
            </li>
            <li>
                <a href="#" class="page-link active" th:text="${currentPage + 1}"></a>
            </li>
            <li th:if="${currentPage < totalPages - 2}">
                <a th:href="@{/admin/users(page=${currentPage + 1})}" class="page-link" th:text="${currentPage + 2}"></a>
            </li>
            <li th:if="${currentPage < totalPages - 4}">
                <span class="page-dots">...</span>
            </li>
            <li th:if="${currentPage < totalPages - 3}">
                <a th:href="@{/admin/users(page=${totalPages - 1})}" class="page-link" th:text="${totalPages}"></a>
            </li>
            <li>
                <a th:href="@{/admin/users(page=${currentPage < totalPages - 1 ? currentPage + 1 : currentPage})}"
                   class="page-link" th:classappend="${currentPage >= totalPages - 1} ? 'disabled' : ''">
                    Siguiente &raquo;
                </a>
            </li>
        </ul>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
